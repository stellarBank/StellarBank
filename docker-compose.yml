version: '3.8'

services:
  # PostgreSQL Database
  postgres:
    image: postgres:15-alpine
    container_name: stellarbank-postgres
    environment:
      POSTGRES_DB: stellarbank
      POSTGRES_USER: stellarbank
      POSTGRES_PASSWORD: stellarbank_dev_2024
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
      - ./backend/migrations/init.sql:/docker-entrypoint-initdb.d/init.sql
    networks:
      - stellarbank-network
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U stellarbank"]
      interval: 10s
      timeout: 5s
      retries: 5

  # Redis Cache
  redis:
    image: redis:7-alpine
    container_name: stellarbank-redis
    ports:
      - "6379:6379"
    volumes:
      - redis_data:/data
    networks:
      - stellarbank-network
    command: redis-server --appendonly yes
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 3s
      retries: 5

  # Backend API
  backend:
    build:
      context: ./backend
      dockerfile: Dockerfile
      target: development
    container_name: stellarbank-backend
    environment:
      NODE_ENV: development
      PORT: 8000
      DATABASE_URL: postgresql://stellarbank:stellarbank_dev_2024@postgres:5432/stellarbank
      REDIS_URL: redis://redis:6379
      JWT_SECRET: stellarbank_jwt_development_secret_key_2024
      STELLAR_NETWORK: testnet
      STELLAR_HORIZON_URL: https://horizon-testnet.stellar.org
    ports:
      - "8000:8000"
    volumes:
      - ./backend:/app
      - /app/node_modules
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
    networks:
      - stellarbank-network
    command: npm run dev

  # Frontend Web App
  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile
      target: development
    container_name: stellarbank-frontend
    environment:
      NEXT_PUBLIC_API_URL: http://localhost:8000
      NEXT_PUBLIC_STELLAR_NETWORK: testnet
      NEXT_PUBLIC_STELLAR_HORIZON_URL: https://horizon-testnet.stellar.org
    ports:
      - "3000:3000"
    volumes:
      - ./frontend:/app
      - /app/node_modules
      - /app/.next
    depends_on:
      - backend
    networks:
      - stellarbank-network
    command: npm run dev

  # Nginx Load Balancer
  nginx:
    image: nginx:alpine
    container_name: stellarbank-nginx
    ports:
      - "80:80"
      - "443:443"
    volumes:
      - ./nginx/nginx.conf:/etc/nginx/nginx.conf
      - ./nginx/ssl:/etc/nginx/ssl
    depends_on:
      - frontend
      - backend
    networks:
      - stellarbank-network
    restart: unless-stopped

  # Soroban RPC (for smart contract development)
  soroban-rpc:
    image: stellar/soroban-rpc:20.1.0
    container_name: stellarbank-soroban-rpc
    ports:
      - "8001:8000"
    environment:
      STELLAR_CORE_DATABASE_URL: postgresql://stellarbank:stellarbank_dev_2024@postgres:5432/soroban_core
      HISTORY_ARCHIVE_URLS: https://history.stellar.org/prd/core-testnet/core_testnet_001
    depends_on:
      postgres:
        condition: service_healthy
    networks:
      - stellarbank-network
    command: >
      sh -c "
        soroban-rpc --config-path=/etc/soroban-rpc/soroban-rpc.cfg
      "

  # Prometheus Monitoring
  prometheus:
    image: prom/prometheus:latest
    container_name: stellarbank-prometheus
    ports:
      - "9090:9090"
    volumes:
      - ./monitoring/prometheus.yml:/etc/prometheus/prometheus.yml
      - prometheus_data:/prometheus
    networks:
      - stellarbank-network
    command:
      - '--config.file=/etc/prometheus/prometheus.yml'
      - '--storage.tsdb.path=/prometheus'
      - '--web.console.libraries=/etc/prometheus/console_libraries'
      - '--web.console.templates=/etc/prometheus/consoles'

  # Grafana Dashboard
  grafana:
    image: grafana/grafana:latest
    container_name: stellarbank-grafana
    ports:
      - "3001:3000"
    environment:
      GF_SECURITY_ADMIN_PASSWORD: stellarbank_admin_2024
    volumes:
      - grafana_data:/var/lib/grafana
      - ./monitoring/grafana/dashboards:/etc/grafana/provisioning/dashboards
      - ./monitoring/grafana/datasources:/etc/grafana/provisioning/datasources
    depends_on:
      - prometheus
    networks:
      - stellarbank-network

volumes:
  postgres_data:
    driver: local
  redis_data:
    driver: local
  prometheus_data:
    driver: local
  grafana_data:
    driver: local

networks:
  stellarbank-network:
    driver: bridge